version: "1.0"

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:6.2.2
    container_name: zookeeper_rnd
    restart: always
    ports:
      - "2181:2181"
    volumes:
      - "zookeeper_data:/data"
    environment:
      - ZOOKEEPER_CLIENT_PORT=2181
  kafka:
    image: confluentinc/cp-kafka:6.2.2
    container_name: kafka_rnd
    ports:
      - "9092:9092"
    restart: always
    volumes:
      - "kafka_data:/kafka"
    environment:
      - KAFKA_BROKER_ID=1
      - KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_LISTENERS=PLAINTEXT://:9092
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
    depends_on:
      - zookeeper
      
volumes:
  zookeeper_data:
    driver: local
  kafka_data:
    driver: local
   
networks:
  default:    
    name: mydockernetwork
    external: true
    
